services:
  workspace:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace
    volumes:
      - .:/workspace
      - pnpm-store:/pnpm/store
      - node-modules:/workspace/node_modules
    command: pnpm -w build

  web:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace
    volumes:
      - .:/workspace
      - pnpm-store:/pnpm/store
      - node-modules:/workspace/node_modules
    ports:
      - "5173:5173"
    command: pnpm --filter @form-forge/web dev --host 0.0.0.0 --port 5173

volumes:
  pnpm-store:
  node-modules:
